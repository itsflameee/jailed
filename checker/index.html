<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>its.flame's Jailed | Checker</title>
</head>
<body>

<div id="debug-info">
    firmware = "<span id="ios-ver">...</span>"<br>
    viewer = "<span id="viewer-val">...</span>"
</div>

<script>
async function getDeviceInfo() {
    // firmware ver
    const ua = navigator.userAgent;
    let iosVersion = "Unknown";
    const match = ua.match(/OS (\d+[._]\d+)/);
    if (match) {
        iosVersion = match[1].replace('_', '.');
    }

    // viewer type check
    const isStandalone = window.navigator.standalone === true;
    const viewerType = isStandalone ? "webclip" : "safari-like";

    document.getElementById('ios-ver').textContent = iosVersion;
    document.getElementById('viewer-val').textContent = viewerType;
}

document.addEventListener("DOMContentLoaded", getDeviceInfo);
</script>
</body>
</html>
